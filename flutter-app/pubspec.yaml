name: battle_asia
description: Battle Asia — Tournament Arena
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_inappwebview: ^6.1.5
  flutter_native_splash: ^2.4.1
  connectivity_plus: ^6.0.5
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_native_splash:
  color: "#0A0617"
  image: assets/splash_logo.png
  android_12:
    color: "#0A0617"
    image: assets/splash_logo.png
  android: true
  ios: true
  fullscreen: true
